<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="calendar">
  <main class="wrap">
    <header class="opt-head">
      <span class="brand-mark big">◆</span>
      <h1 data-i18n="calTitle"></h1>
      <p class="sub" data-i18n="calSub"></p>
    </header>

    <div class="cal-top">
      <button id="prev" class="mini-btn" aria-label="Previous month">‹</button>
      <div id="month-label" class="month-label"></div>
      <button id="next" class="mini-btn" aria-label="Next month">›</button>
    </div>

    <div id="weekdays" class="weekdays"></div>
    <div id="grid" class="cal-grid"></div>

    <section id="day-detail" class="day-detail"></section>
  </main>

  <script src="lib.js"></script>
  <script src="history.js"></script>
</body>
</html>
